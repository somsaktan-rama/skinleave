<!DOCTYPE html>
<html lang="th" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin 1.05-จัดการการลา</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; transition: background-color 0.3s, color 0.3s; }
    body[data-bs-theme="light"] { background-color: #f4f7f6; }
    .header-panel { background: #343a40; color: white; padding: 20px; border-radius: 0 0 15px 15px; position: relative; }
    .card-history { border: none; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.3s; margin-bottom: 1rem; }
    body[data-bs-theme="dark"] .card-history { background-color: #212529; border: 1px solid #343a40; }
    .status-pending { border-left: 5px solid #ffc107; }
    .status-done { border-left: 5px solid #28a745; opacity: 0.7; }
    .time-tag { font-size: 0.75rem; color: #6c757d; }
    
    /* ปุ่มสลับโหมด */
    .btn-theme { position: absolute; top: 15px; right: 15px; background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 20px; padding: 5px 15px; font-size: 0.85rem; }
    .btn-theme:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

<!-- หน้า Login -->
<div id="login-view" class="container py-5" style="max-width: 400px;">
  <div class="card p-4 shadow-sm border-0 rounded-4">
    <h4 class="text-center fw-bold mb-3">เจ้าหน้าที่ลงนัด Login</h4>
    <div class="mb-3">
      <label class="form-label small text-muted">รหัสเจ้าหน้าที่ (RamaID)</label>
      <input type="tel" id="admin-id" class="form-control form-control-lg text-center" placeholder="กรอกรหัส...">
    </div>
    <button id="btn-login" class="btn btn-dark btn-lg w-100" onclick="doAdminLogin()">เข้าสู่ระบบ</button>
  </div>
</div>

<!-- หน้า History (ซ่อนไว้จนกว่าจะ Login) -->
<div id="main-view" class="container py-4 d-none">
  <div class="header-panel mb-4 shadow-sm">
    <button class="btn-logout" onclick="doLogout()" style="position: absolute; top: 15px; left: 15px; background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 20px; padding: 5px 15px; font-size: 0.85rem;">🚪 ออกจากระบบ</button>    
    <button class="btn-theme" onclick="toggleTheme()">🌗 Dark Mode</button>
    <h4 class="mb-1 text-center">📋 จัดการแจ้งลาล่าสุด</h4>
    <p class="small text-center opacity-75 mb-0" id="admin-info">กำลังโหลด...</p>
  </div>

  <div id="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div><br>กำลังโหลดประวัติ...
  </div>

<!-- 🟢 ส่วน Filter กรองตามกลุ่ม และ ปุ่ม Refresh -->
  <div class="mb-3 d-flex gap-2">
    <select id="group-filter" class="form-select shadow-sm border-primary" onchange="filterHistory()">
      <option value="">👥 แสดงทั้งหมดทุกกลุ่ม</option>
      <option value="อาจารย์">👨‍⚕️ กลุ่มอาจารย์</option>
      <option value="แพทย์">🩺 กลุ่มแพทย์ประจำบ้าน / ผู้ช่วย</option>
      <option value="เจ้าหน้าที่">💼 กลุ่มเจ้าหน้าที่ / อื่นๆ</option>
    </select>
    
    <!-- ปุ่มรีเฟรช -->
    <button id="btn-refresh" class="btn btn-primary shadow-sm text-nowrap fw-bold" onclick="refreshHistory()">
      🔄 รีเฟรช
    </button>
  </div>
  
  <div id="history-container" class="row"></div>
</div>

<script>
  // 🟢 1. ใส่ URL ของ Web App ตรงนี้ (ก๊อปปี้จากหน้า index ก็ได้ครับ)
  const API_URL = 'https://script.google.com/macros/s/AKfycbwmRMQDNTAEL6AxwWGC4WrOYstKO_uLlQJ06sUf_sbzbxPthhi6K5Yb1GX4sKOs6jW4/exec';
  
  let currentAdminRole = '';
  let currentAdminName = '';
  let currentAdminId = ''; // 🟢 เพิ่มตัวแปรนี้
  
  // โหลด Theme จากที่เคยตั้งไว้
  window.onload = () => {
    const savedTheme = localStorage.getItem('adminTheme') || 'light';
    document.documentElement.setAttribute('data-bs-theme', savedTheme);
  };

  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-bs-theme') === 'dark';
    html.setAttribute('data-bs-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('adminTheme', isDark ? 'light' : 'dark');
  }

  async function doAdminLogin() {
    const adminId = document.getElementById('admin-id').value.trim();
    if (!adminId) return alert('กรุณากรอกรหัส');

    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.innerText = 'กำลังตรวจสอบ...';

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'adminLogin', adminId: adminId })
      });
      const res = await response.json();
      
      if (res.success) {
        currentAdminRole = res.role; 
        currentAdminName = res.name;
        currentAdminId = adminId; // 🟢 จำรหัสแอดมินไว้ใช้งานต่อ
        
        document.getElementById('login-view').classList.add('d-none');
        document.getElementById('main-view').classList.remove('d-none');
        
        // 🟢 แสดงชื่อ รหัส และสิทธิ์ ให้ชัดเจนที่มุมบน
        document.getElementById('admin-info').innerText = `ผู้ดูแล: ${currentAdminName} (${currentAdminId}) | สิทธิ์: ${currentAdminRole}`;
        
        loadHistory();
      } else {
        alert(res.message);
      }
    } catch (e) { alert('การเชื่อมต่อขัดข้อง'); }
    
    btn.disabled = false; btn.innerText = 'เข้าสู่ระบบ';
  }

// 🟢 ฟังก์ชันสำหรับออกจากระบบ
  function doLogout() {
    if (!confirm('คุณต้องการออกจากระบบใช่หรือไม่?')) return;

    // 1. ล้างค่าตัวแปรในระบบ
    currentAdminRole = '';
    currentAdminName = '';

    // 2. ล้างค่าในช่องกรอกรหัส (เพื่อความปลอดภัย)
    document.getElementById('admin-id').value = '';

    // 3. สลับหน้าจอ กลับไปหน้า Login
    document.getElementById('main-view').classList.add('d-none');
    document.getElementById('login-view').classList.remove('d-none');

    // 4. ล้างข้อมูลในการ์ดเดิมออก (ไม่ให้ค้างตอน Login ใหม่)
    document.getElementById('history-container').innerHTML = '';
  }
  
let allHistoryData = []; // ตัวแปรเก็บข้อมูลทั้งหมดก่อนกรอง

  async function loadHistory() {
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'getAdminHistory' })
      });
      allHistoryData = await response.json();
      filterHistory(); // 🟢 โหลดเสร็จให้เรียกฟังก์ชันกรอง
    } catch (e) { console.error(e); }
  }

  // 🟢 ฟังก์ชันกรองตาม Group
  function filterHistory() {
    const groupFilter = document.getElementById('group-filter').value;
    
    const filteredData = allHistoryData.filter(item => {
      let userGroup = (item.group || "").trim();
      
      if (groupFilter === "") return true;
      else if (groupFilter === "อาจารย์") return ["อาจารย์ประจำ", "อาจารย์สายบริการ", "อาจารย์พิเศษ"].includes(userGroup);
      else if (groupFilter === "แพทย์") return ["แพทย์ประจำบ้านปี 2", "แพทย์ประจำบ้านปี 3", "แพทย์ประจำบ้านปี 4", "แพทย์ผู้ช่วยวิจัย", "แพทย์ผู้ช่วยอาจารย์"].includes(userGroup);
      else return !["อาจารย์ประจำ", "อาจารย์สายบริการ", "อาจารย์พิเศษ", "แพทย์ประจำบ้านปี 2", "แพทย์ประจำบ้านปี 3", "แพทย์ประจำบ้านปี 4", "แพทย์ผู้ช่วยวิจัย", "แพทย์ผู้ช่วยอาจารย์"].includes(userGroup); // ที่เหลือถือเป็นเจ้าหน้าที่
    });

    renderHistory(filteredData);
  }

  function renderHistory(items) {
    const container = document.getElementById('history-container');
    const loading = document.getElementById('loading');
    loading.classList.add('d-none');
    container.innerHTML = '';

    if (!items || items.length === 0) {
      container.innerHTML = '<div class="alert alert-light text-center border">ไม่มีรายการในหมวดหมู่นี้</div>';
      return;
    }

    items.forEach(item => {
      const details = item.details || "";
      const hasF2 = details.includes('ชั้น 2');
      const hasF4 = details.includes('ชั้น 4');

      const status = item.status || "";
      const doneF2 = status.includes('ชั้น 2') || status.includes('รับทราบแล้ว');
      const doneF4 = status.includes('ชั้น 4') || status.includes('รับทราบแล้ว');
      const isCancelReq = status.includes('🔴 ขอยกเลิก');

      let btnHtml = '';

      // 🟢 ถ้ารายการนี้เป็นการ "ขอยกเลิก" ปุ่มจะเปลี่ยนโหมด
      if (isCancelReq) {
        const cancelDoneF2 = status.includes('ยกเลิกแล้ว ชั้น 2') || status.includes('ยกเลิกสำเร็จ');
        const cancelDoneF4 = status.includes('ยกเลิกแล้ว ชั้น 4') || status.includes('ยกเลิกสำเร็จ');

        if (hasF2) {
          if (cancelDoneF2) btnHtml += `<span class="badge bg-success me-1 mb-1">✔️ ยกเลิกชั้น 2</span>`;
          else if (currentAdminRole === 'admin2') btnHtml += `<button class="btn btn-danger btn-sm fw-bold me-1 mb-1 shadow-sm" onclick="approveCancel('${item.eventId}', 'ชั้น 2', this)">🗑️ อนุมัติยกเลิกชั้น 2</button>`;
          else btnHtml += `<span class="badge bg-secondary me-1 mb-1 opacity-50">🔒 รอชั้น 2 ยกเลิก</span>`;
        }
        if (hasF4) {
          if (cancelDoneF4) btnHtml += `<span class="badge bg-success me-1 mb-1">✔️ ยกเลิกชั้น 4</span>`;
          else if (currentAdminRole === 'admin4') btnHtml += `<button class="btn btn-danger btn-sm fw-bold me-1 mb-1 shadow-sm" onclick="approveCancel('${item.eventId}', 'ชั้น 4', this)">🗑️ อนุมัติยกเลิกชั้น 4</button>`;
          else btnHtml += `<span class="badge bg-secondary me-1 mb-1 opacity-50">🔒 รอชั้น 4 ยกเลิก</span>`;
        }
        if (!hasF2 && !hasF4) {
          if (status.includes('ยกเลิกสำเร็จ')) btnHtml = `<span class="badge bg-success">✔️ ยกเลิกสำเร็จ</span>`;
          else btnHtml = `<button class="btn btn-danger btn-sm fw-bold shadow-sm" onclick="approveCancel('${item.eventId}', 'ทั่วไป', this)">🗑️ อนุมัติยกเลิก</button>`;
        }
      } else {
        // 🟢 โหมดปกติ (ปุ่มรับทราบสีเหลืองเหมือนเดิมที่คุณทำไว้)
        if (hasF2) {
          if (doneF2) btnHtml += `<span class="badge bg-success me-1 mb-1">✔️ ชั้น 2</span>`;
          else if (currentAdminRole === 'admin2') btnHtml += `<button class="btn btn-warning btn-sm fw-bold me-1 mb-1 shadow-sm" onclick="markAsRead('${item.eventId}', 'ชั้น 2', this)">🚩 ชั้น 2</button>`;
          else btnHtml += `<span class="badge bg-secondary me-1 mb-1 opacity-50">🔒 รอชั้น 2</span>`;
        }
        if (hasF4) {
          if (doneF4) btnHtml += `<span class="badge bg-success me-1 mb-1">✔️ ชั้น 4</span>`;
          else if (currentAdminRole === 'admin4') btnHtml += `<button class="btn btn-warning btn-sm fw-bold me-1 mb-1 shadow-sm" onclick="markAsRead('${item.eventId}', 'ชั้น 4', this)">🚩 ชั้น 4</button>`;
          else btnHtml += `<span class="badge bg-secondary me-1 mb-1 opacity-50">🔒 รอชั้น 4</span>`;
        }
        if (!hasF2 && !hasF4) {
          if (status.includes('รับทราบ')) btnHtml = `<span class="badge bg-success">✔️ รับทราบแล้ว</span>`;
          else btnHtml = `<button class="btn btn-warning btn-sm fw-bold shadow-sm" onclick="markAsRead('${item.eventId}', 'ทั่วไป', this)">🚩 รับทราบ</button>`;
        }
      }
            
      let isCompletelyDone = false;
      if (!hasF2 && !hasF4 && status.includes('รับทราบ')) isCompletelyDone = true;
      else if ((!hasF2 || doneF2) && (!hasF4 || doneF4)) isCompletelyDone = true;

      const card = document.createElement('div');
      card.className = `col-12`;
      card.innerHTML = `
        <div class="card card-history ${isCompletelyDone ? 'status-done' : 'status-pending'} p-3">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="time-tag">ส่งเมื่อ: ${item.timestamp}</div>
              <h5 class="mb-1 fw-bold">${item.name} <span class="badge border border-secondary text-secondary ms-1" style="font-size:0.65em;">${item.group}</span></h5>
              <div class="mb-1"><span class="badge bg-primary">ลา${item.type}</span> 📅 <strong>${item.leaveDate}</strong></div>
              <div class="small opacity-75"><strong>รายละเอียด:</strong> ${item.details}</div>
              <div class="small mt-1" style="color: #6f42c1; font-weight: 500;">สถานะ: ${status || '⏳ รอรับทราบ'}</div>
            </div>
            <div class="text-end" style="min-width: 90px;">
              ${btnHtml}
            </div>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  }

async function markAsRead(eventId, floor, btn) {
    if (!confirm(`ยืนยันการรับทราบรายการนี้${floor === 'ทั่วไป' ? '' : ' สำหรับ ' + floor}?`)) return;
    btn.disabled = true;
    btn.innerText = 'รอ...';
    
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        // 🟢 แนบ currentAdminId ส่งเพิ่มเข้าไปตรงนี้
        body: JSON.stringify({ action: 'flagLeave', eventId: eventId, floor: floor, adminName: currentAdminName, adminId: currentAdminId })
      });
      const res = await response.json();
      if (res.success) loadHistory();
      else { alert(res.message); btn.disabled = false; btn.innerText = '🚩 ' + floor; }
    } catch (e) { alert('เกิดข้อผิดพลาดในการเชื่อมต่อ'); btn.disabled = false; btn.innerText = '🚩 ' + floor; }
  }

async function approveCancel(eventId, floor, btn) {
    if (!confirm(`ยืนยันการอนุมัติยกเลิกรายการนี้${floor === 'ทั่วไป' ? '' : ' สำหรับ ' + floor} ใช่หรือไม่?\n(เมื่อยกเลิกครบแล้ว ข้อมูลจะถูกลบออกจากตารางหลักทันที)`)) return;
    btn.disabled = true; btn.innerText = 'รอ...';
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'approveCancel', eventId: eventId, floor: floor, adminName: currentAdminName, adminId: currentAdminId })
      });
      const res = await response.json();
      if (res.success) loadHistory();
      else { alert(res.message); btn.disabled = false; btn.innerText = '🗑️ ยกเลิก ' + floor; }
    } catch (e) { alert('เกิดข้อผิดพลาด'); btn.disabled = false; }
  }

// 🟢 ฟังก์ชันสำหรับกดปุ่มรีเฟรชข้อมูล
  async function refreshHistory() {
    const btn = document.getElementById('btn-refresh');
    const loading = document.getElementById('loading');
    const container = document.getElementById('history-container');
    
    // 1. เปลี่ยนหน้าตาปุ่มและล้างข้อมูลเดิมออกชั่วคราว
    btn.disabled = true;
    btn.innerHTML = '⏳ โหลด...';
    container.innerHTML = '';
    loading.classList.remove('d-none'); // โชว์ตัวหมุนๆ
    
    // 2. เรียกฟังก์ชันโหลดข้อมูลใหม่
    await loadHistory();
    
    // 3. คืนค่าหน้าตาปุ่มให้กดได้เหมือนเดิม
    btn.disabled = false;
    btn.innerHTML = '🔄 รีเฟรช';
  }
  
</script>
</body>
</html>
