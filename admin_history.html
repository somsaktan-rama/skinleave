<!DOCTYPE html>
<html lang="th" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - ประวัติการแจ้งลา</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; }
    .header-panel { background: #343a40; color: white; padding: 20px; border-radius: 0 0 15px 15px; }
    .card-history { border: none; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.3s; }
    .card-history:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .status-pending { border-left: 5px solid #ffc107; }
    .status-done { border-left: 5px solid #28a745; opacity: 0.7; }
    .time-tag { font-size: 0.75rem; color: #6c757d; }
  </style>
</head>
<body>

<div class="container py-4">
  <div class="header-panel mb-4 shadow-sm">
    <h4 class="mb-0 text-center">📋 รายการแจ้งลาล่าสุด (Admin Only)</h4>
    <p class="small text-center opacity-75 mb-0">เรียงตามเวลาที่แจ้งเข้ามา / กรองเฉพาะรายการที่ยังไม่ถึงกำหนด</p>
  </div>

  <div id="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div><br>กำลังโหลดประวัติ...
  </div>

  <div id="history-container" class="row"></div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbz8arUrcqJtHNmReUHe8xMJ5mqn7PNYe2sijWjHzzT2od9V_wXsYvD8_190AzoNfYbd/exec';

  window.onload = loadHistory;

  async function loadHistory() {
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'getAdminHistory' })
      });
      const data = await response.json();
      renderHistory(data);
    } catch (e) { console.error(e); }
  }

  function renderHistory(items) {
    const container = document.getElementById('history-container');
    const loading = document.getElementById('loading');
    loading.classList.add('d-none');
    container.innerHTML = '';

    if (!items || items.length === 0) {
      container.innerHTML = '<div class="alert alert-light text-center">ไม่มีรายการแจ้งลาใหม่ในขณะนี้</div>';
      return;
    }

    items.forEach(item => {
      const isDone = item.status === 'รับทราบแล้ว';
      const card = document.createElement('div');
      card.className = `col-12 mb-3`;
      
      card.innerHTML = `
        <div class="card card-history ${isDone ? 'status-done' : 'status-pending'} p-3">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="time-tag">ส่งเมื่อ: ${new Date(item.timestamp).toLocaleString('th-TH')}</div>
              <h5 class="mb-1 fw-bold">${item.name} <small class="text-muted">(${item.ramaId})</small></h5>
              <div class="mb-1"><span class="badge bg-primary">ลา${item.type}</span> 📅 <strong>${item.leaveDate}</strong></div>
              <div class="small text-secondary"><strong>รายละเอียด:</strong> ${item.details}</div>
              <div class="small text-info mt-1">👤 ผู้แจ้ง: ${item.informer}</div>
            </div>
            <div>
              ${isDone 
                ? '<span class="badge bg-success">✔️ รับทราบแล้ว</span>' 
                : `<button class="btn btn-warning btn-sm fw-bold" onclick="markAsRead('${item.eventId}', this)">🚩 รับทราบ</button>`
              }
            </div>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  async function markAsRead(eventId, btn) {
    if (!confirm('ยืนยันการรับทราบรายการนี้?')) return;
    btn.disabled = true;
    btn.innerText = 'กำลังบันทึก...';
    
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'flagLeave', eventId: eventId })
      });
      const res = await response.json();
      if (res.success) {
        loadHistory(); // โหลดใหม่เพื่ออัปเดตสถานะ
      }
    } catch (e) { alert('เกิดข้อผิดพลาด'); btn.disabled = false; }
  }
</script>
</body>
</html>
