<!DOCTYPE html>
<html lang="th" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin-ประวัติการแจ้งลา</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; }
    .header-panel { background: #343a40; color: white; padding: 20px; border-radius: 0 0 15px 15px; }
    .card-history { border: none; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.3s; }
    .card-history:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .status-pending { border-left: 5px solid #ffc107; }
    .status-done { border-left: 5px solid #28a745; opacity: 0.7; }
    .time-tag { font-size: 0.75rem; color: #6c757d; }
  </style>
</head>
<body>

<div class="container py-4">
  <div class="header-panel mb-4 shadow-sm">
    <h4 class="mb-0 text-center">📋 แจ้งลาผิวหนังล่าสุด (Admin)</h4>
    <p class="small text-center opacity-75 mb-0">เรียงตามเวลาที่แจ้งเข้ามา / กรองเฉพาะรายการที่ยังไม่ถึงกำหนด</p>
  </div>

  <div id="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div><br>กำลังโหลดประวัติ...
  </div>

  <div id="history-container" class="row"></div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbwmRMQDNTAEL6AxwWGC4WrOYstKO_uLlQJ06sUf_sbzbxPthhi6K5Yb1GX4sKOs6jW4/exec';

  window.onload = loadHistory;

  async function loadHistory() {
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'getAdminHistory' })
      });
      const data = await response.json();
      renderHistory(data);
    } catch (e) { console.error(e); }
  }

  function renderHistory(items) {
    const container = document.getElementById('history-container');
    const loading = document.getElementById('loading');
    loading.classList.add('d-none');
    container.innerHTML = '';

    if (!items || items.length === 0) {
      container.innerHTML = '<div class="alert alert-light text-center">ไม่มีรายการแจ้งลาใหม่ในขณะนี้</div>';
      return;
    }

    items.forEach(item => {
      // 1. เช็กว่ามีการเลือกชั้นไหนมาบ้างจากคำว่า "📍สถานที่:" ใน details
      const details = item.details || "";
      const hasF2 = details.includes('ชั้น 2');
      const hasF4 = details.includes('ชั้น 4');

      // 2. เช็กสถานะปัจจุบันจากฐานข้อมูล ว่าชั้นไหนเคยกดรับทราบไปแล้วบ้าง
      const status = item.status || "";
      const doneF2 = status.includes('ชั้น 2') || status === 'รับทราบแล้ว';
      const doneF4 = status.includes('ชั้น 4') || status === 'รับทราบแล้ว';

      // 3. สร้างปุ่มกดตามเงื่อนไขชั้น
      let btnHtml = '';

      // กรณีมีชั้น 2
      if (hasF2) {
        if (doneF2) btnHtml += `<span class="badge bg-success me-1 mb-1">✔️ ชั้น 2</span>`;
        else btnHtml += `<button class="btn btn-warning btn-sm fw-bold me-1 mb-1 shadow-sm" onclick="markAsRead('${item.eventId}', 'ชั้น 2', this)">🚩 ชั้น 2</button>`;
      }

      // กรณีมีชั้น 4
      if (hasF4) {
        if (doneF4) btnHtml += `<span class="badge bg-success me-1 mb-1">✔️ ชั้น 4</span>`;
        else btnHtml += `<button class="btn btn-warning btn-sm fw-bold me-1 mb-1 shadow-sm" onclick="markAsRead('${item.eventId}', 'ชั้น 4', this)">🚩 ชั้น 4</button>`;
      }

      // กรณีไม่ได้เลือกชั้น (อาจเป็นลาประเภทอื่น)
      if (!hasF2 && !hasF4) {
        if (status.includes('รับทราบ')) btnHtml = `<span class="badge bg-success">✔️ รับทราบแล้ว</span>`;
        else btnHtml = `<button class="btn btn-warning btn-sm fw-bold shadow-sm" onclick="markAsRead('${item.eventId}', 'ทั่วไป', this)">🚩 รับทราบ</button>`;
      }

      // 4. เช็กว่าการ์ดใบนี้เสร็จสมบูรณ์หรือยัง (ชั้นที่ถูกเลือก ต้องโดนกดรับทราบครบแล้ว)
      let isCompletelyDone = false;
      if (!hasF2 && !hasF4 && status.includes('รับทราบ')) isCompletelyDone = true;
      else if ((!hasF2 || doneF2) && (!hasF4 || doneF4)) isCompletelyDone = true;

      const card = document.createElement('div');
      card.className = `col-12 mb-3`;
      card.innerHTML = `
        <div class="card card-history ${isCompletelyDone ? 'status-done' : 'status-pending'} p-3">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="time-tag">ส่งเมื่อ: ${new Date(item.timestamp).toLocaleString('th-TH')}</div>
              <h5 class="mb-1 fw-bold">${item.name} <small class="text-muted">(${item.ramaId})</small></h5>
              <div class="mb-1"><span class="badge bg-primary">ลา${item.type}</span> 📅 <strong>${item.leaveDate}</strong></div>
              <div class="small text-secondary"><strong>รายละเอียด:</strong> ${item.details}</div>
              <div class="small text-info mt-1">👤 ผู้แจ้ง: ${item.informer}</div>
            </div>
            <div class="text-end" style="min-width: 90px;">
              ${btnHtml}
            </div>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  async function markAsRead(eventId, floor, btn) {
    if (!confirm(`ยืนยันการรับทราบรายการนี้${floor === 'ทั่วไป' ? '' : ' สำหรับ ' + floor}?`)) return;
    btn.disabled = true;
    btn.innerText = 'รอ...';
    
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        // ส่งตัวแปร floor เพิ่มเข้าไปให้หลังบ้านรู้ว่าชั้นไหนกด
        body: JSON.stringify({ action: 'flagLeave', eventId: eventId, floor: floor })
      });
      const res = await response.json();
      if (res.success) {
        loadHistory(); // โหลดใหม่เพื่ออัปเดตสีปุ่ม
      } else {
        alert(res.message);
        btn.disabled = false;
        btn.innerText = '🚩 ' + floor;
      }
    } catch (e) { 
      alert('เกิดข้อผิดพลาดในการเชื่อมต่อ'); 
      btn.disabled = false; 
      btn.innerText = '🚩 ' + floor;
    }
  }
</script>
</body>
</html>
