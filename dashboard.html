<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สรุปการลา หน่วยโรคผิวหนัง</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: 'Sarabun', sans-serif; }
    .header-panel { background: linear-gradient(135deg, #20c997 0%, #12a378 100%); color: white; padding: 20px; border-radius: 0 0 15px 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .table-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow-x: auto; }
    .badge-leave { font-size: 0.85em; padding: 5px 10px; }
    th { white-space: nowrap; background-color: #f1f4f9 !important; }
    td { vertical-align: middle; white-space: nowrap; }
    .timestamp-text { font-size: 0.8em; color: #888; }
  </style>
</head>
<body>

<div class="container-fluid mt-2 mb-5">
  <div class="header-panel text-center">
    <h3 class="fw-bold mb-0">📊 สรุปการลา สาขาวิชาโรคผิวหนัง</h3>
    <p class="mb-0 mt-2 opacity-75">แสดงข้อมูลการลาที่กำลังจะมาถึง</p>
  </div>

  <div class="row mb-3">
    <div class="col-md-6 mb-2">
      <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="🔍 ค้นหา ชื่อ หรือ รหัส RamaID..." onkeyup="filterTable()">
    </div>
    
    <div class="col-md-6 mb-2">
      <select id="groupFilter" class="form-select form-select-lg" onchange="filterTable()">
        <option value="">-- แสดงทุกกลุ่ม --</option>
        <option value="อาจารย์">อาจารย์</option>
        <option value="แพทย์ประจำบ้าน">แพทย์ประจำบ้าน</option>
        <option value="แพทย์ผู้ช่วย">แพทย์ผู้ช่วย</option>
        <option value="เจ้าหน้าที่">เจ้าหน้าที่</option>
      </select>
    </div>
  </div>

  <div class="table-container">
    <div id="loading" class="text-center py-4 text-muted">
      <div class="spinner-border text-success mb-2" role="status"></div><br>
      กำลังโหลดข้อมูล...
    </div>
    
    <table class="table table-hover d-none align-middle" id="dashboardTable">
      <thead class="table-light">
        <tr>
          <th>วันที่ลา</th>
          <th>รหัสบุคคล</th>
          <th>ชื่อ-สกุล</th>
          <th>กลุ่ม (Group)</th>
          <th>ประเภท</th>
          <th>ลาคลินิกตรวจ</th>
          <th>LINE ผู้แจ้ง</th>
          <th>เวลาทำรายการ</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        </tbody>
    </table>
    
    <div id="noData" class="alert alert-warning text-center d-none mt-3 border-0 shadow-sm">
      ไม่มีรายการขออนุมัติลาที่รออยู่
    </div>
  </div>
</div>

<script>
  // ==========================================
  // 📍 นำ URL ของ Web App Google Apps Script มาวางที่นี่
  const API_URL = 'https://script.google.com/macros/s/AKfycbyIfJWYnZ3FAe8gfYB3Tb3OY8moqR2lJOHUUYq6UFJrzcTve3dtlf6S7JOBkWwgsVIB/exec'; 
  // ==========================================

  let allData = [];

  // ดึงข้อมูลเมื่อโหลดหน้าเว็บเสร็จ
  window.onload = async function() {
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        redirect: 'follow',
        body: JSON.stringify({ action: 'getDashboardData' })
      });
      const data = await response.json();
      allData = data;
      renderTable(allData);
    } catch (error) {
      document.getElementById('loading').innerHTML = '<div class="alert alert-danger">เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล กรุณาลองใหม่อีกครั้ง</div>';
      console.error(error);
    }
  };

  // ฟังก์ชันวาดตาราง
  function renderTable(data) {
    document.getElementById('loading').classList.add('d-none');
    const tbody = document.getElementById('tableBody');
    const table = document.getElementById('dashboardTable');
    const noData = document.getElementById('noData');
    
    tbody.innerHTML = '';

    if (!data || data.length === 0) {
      table.classList.add('d-none');
      noData.classList.remove('d-none');
      return;
    }

    table.classList.remove('d-none');
    noData.classList.add('d-none');

    data.forEach(row => {
      // ตกแต่งสีให้แยกประเภทการลาได้ชัดเจน
      let badgeClass = 'bg-secondary';
      if(row.leaveCode === 'ป่วย') badgeClass = 'bg-danger';
      else if(row.leaveCode === 'กิจ') badgeClass = 'bg-warning text-dark';
      else if(row.leaveCode === 'พักผ่อน') badgeClass = 'bg-success';
      else if(row.leaveCode === 'เรียนเลือก' || row.leaveCode === 'ประชุม') badgeClass = 'bg-info text-dark';
      else if(row.leaveCode === 'ต่างประเทศ') badgeClass = 'bg-primary';

      const tr = document.createElement('tr');
// เปลี่ยนหัวตารางใน HTML เป็น "ผู้แจ้ง (Informer)"
// และใน Loop การวาดตาราง ให้ใช้ row.informer
tr.innerHTML = `
  <td class="fw-bold text-success">${row.leaveDate}</td>
  <td class="text-muted">${row.ramaID}</td>
  <td class="fw-bold">${row.name}</td>
  <td><span class="badge border border-secondary text-secondary">${row.group}</span></td>
  <td><span class="badge badge-leave ${badgeClass}">${row.leaveCode}</span></td>
  <td>${row.exam}</td>
  <td class="small text-info">👤 ${row.informer}</td> <td class="timestamp-text">${row.timestamp}</td>
`;
      tbody.appendChild(tr);
    });
  }

// ฟังก์ชันค้นหาและกรองข้อมูล (อัปเดตแยกกลุ่มย่อยชัดเจน)
  function filterTable() {
    const searchText = document.getElementById('searchInput').value.toLowerCase();
    const groupFilter = document.getElementById('groupFilter').value; 

    const filteredData = allData.filter(row => {
      // 1. เงื่อนไขค้นหาข้อความ (คลุมชื่อและรหัส)
      const matchSearch = row.name.toLowerCase().includes(searchText) || row.ramaID.includes(searchText);
      
      // 2. เงื่อนไขกรองกลุ่มแบบระบุ Sub-group
      let matchGroup = false;
      let userGroup = row.group.trim(); // ตัดช่องว่างกันพลาด

      if (groupFilter === "") {
        // แสดงทุกกลุ่ม
        matchGroup = true;
      } 
      else if (groupFilter === "อาจารย์") {
        // ป้องกันดึง 'แพทย์ผู้ช่วยอาจารย์' ติดมาด้วย โดยระบุชื่อตรงๆ
        matchGroup = ["อาจารย์ประจำ", "อาจารย์สายบริการ", "อาจารย์พิเศษ"].includes(userGroup);
      } 
      else if (groupFilter === "แพทย์ประจำบ้าน") {
        // ดึงเฉพาะแพทย์ประจำบ้านปี 2, 3, 4
        matchGroup = ["แพทย์ประจำบ้านปี 2", "แพทย์ประจำบ้านปี 3", "แพทย์ประจำบ้านปี 4"].includes(userGroup);
      } 
      else if (groupFilter === "แพทย์ผู้ช่วย") {
        // ดึงเฉพาะแพทย์ผู้ช่วยวิจัย และ แพทย์ผู้ช่วยอาจารย์
        matchGroup = ["แพทย์ผู้ช่วยวิจัย", "แพทย์ผู้ช่วยอาจารย์"].includes(userGroup);
      }
      else {
        // สำหรับกลุ่มอื่นๆ (เช่น เจ้าหน้าที่) ให้เทียบชื่อให้ตรงกันพอดี
        matchGroup = userGroup === groupFilter;
      }
      
      return matchSearch && matchGroup;
    });

    renderTable(filteredData);
  }  
  
</script>
</body>
</html>
