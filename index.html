<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบลางาน สาขาวิชาผิวหนัง</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: sans-serif; }
    .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .hidden { display: none !important; }
    .app-header { background-color: #0d6efd; color: white; padding: 15px; border-radius: 0 0 15px 15px; margin-bottom: 20px;}
    .exam-row { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="container mt-3 mb-5" id="app">
  <div id="view-login" class="card p-4">
    <h3 class="text-center mb-4">ระบบลางานออนไลน์<br><small>สาขาวิชาผิวหนัง</small></h3>
    <div class="mb-3">
      <input type="number" id="login-id" class="form-control form-control-lg" placeholder="รหัส RamaID">
    </div>
    <button class="btn btn-primary btn-lg w-100 mb-3" id="btn-login" onclick="doLogin()">เข้าสู่ระบบ</button>
    <button class="btn btn-outline-secondary w-100" onclick="showView('view-search')">ค้นหาข้อมูลการลา</button>
  </div>

  <div id="view-main" class="hidden">
    <div class="app-header text-center">
      <h5 id="display-name">ชื่อ-สกุล</h5>
      <span class="badge bg-light text-dark" id="display-group">Group</span>
      <p class="mb-0 mt-2 small" id="display-rama-id"></p>
    </div>
    
    <div class="card p-3 mb-3">
      <h5>กรอกข้อมูลการลา</h5>
      <div class="mb-3">
        <label>ประเภทการลา</label>
        <select id="leave-type" class="form-select" onchange="setupLeaveRules()">
          <option value="">-- เลือกประเภท --</option>
          <option value="ป่วย">ป่วย</option>
          <option value="กิจ">กิจ</option>
          <option value="พักผ่อน">พักผ่อน</option>
          <option value="เรียนเลือก">เรียนเลือก</option>
          <option value="ประชุม">ประชุม</option>
          <option value="ต่างประเทศ">ต่างประเทศ</option>
        </select>
      </div>
      
      <div class="mb-3">
        <label>วันที่เริ่มต้นลา</label>
        <input type="date" id="leave-date" class="form-control" disabled>
        <small id="date-hint" class="text-muted"></small>
      </div>

      <div class="mb-3">
        <label>จำนวนวันลา</label>
        <select id="leave-duration" class="form-select" disabled></select>
      </div>

      <button class="btn btn-primary w-100" id="btn-next" onclick="prepareExamSelection()" disabled>ถัดไป</button>
    </div>
    <button class="btn btn-danger w-100" onclick="logout()">ออกจากระบบ</button>
  </div>

  <div id="view-exam" class="hidden card p-3">
    <h5 class="mb-3">ระบุช่วงเวลาลาตรวจ</h5>
    <div id="exam-list-container"></div>
    <div class="d-flex justify-content-between mt-4">
      <button class="btn btn-secondary w-45" onclick="showView('view-main')">ย้อนกลับ</button>
      <button class="btn btn-success w-45" id="btn-confirm" onclick="submitLeave()">ยืนยันข้อมูล</button>
    </div>
  </div>

  <div id="view-search" class="hidden card p-3">
    <h5 class="mb-3">ค้นหาข้อมูลการลา</h5>
    <div class="mb-3"><input type="date" id="search-date" class="form-control"></div>
    <button class="btn btn-primary w-100 mb-3" onclick="executeSearch()">ค้นหา</button>
    <div id="search-results"></div>
    <hr><button class="btn btn-secondary w-100" onclick="showView('view-login')">กลับหน้าแรก</button>
  </div>
</div>

<script>
  // ==========================================
  // นำ URL ของ Web App ที่ได้จาก Google Apps Script มาวางที่นี่
  const API_URL = 'https://script.google.com/macros/s/AKfycbwSMbzZZJL5AWfoXCnRg4jDDPJNNZ-o3-faCNokPUJEgOvBY696nyJBTJpq-4KRbUpL/exec'; 
  // ==========================================

  let currentUser = null;
  let systemData = { holidays: [], leaveTypes: [] };
  let calculatedLeaveDays = [];

  // ฟังก์ชันจัดรูปแบบวันที่ YYYY-MM-DD แบบ Local Time
  function formatDateStr(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  // ฟังก์ชันเชื่อมต่อกับ Google Apps Script
  async function callAPI(action, data = {}) {
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        redirect: 'follow', // จำเป็นสำหรับการทำงานข้ามโดเมนของ Google
        body: JSON.stringify({ action: action, ...data })
      });
      
      const responseText = await response.text();
      try {
        return JSON.parse(responseText);
      } catch (parseErr) {
        console.error("เซิร์ฟเวอร์ไม่ได้ตอบกลับเป็น JSON:", responseText);
        alert('เชื่อมต่อฐานข้อมูลไม่ได้ (อาจตั้งค่า Deploy ผิด หรือ URL ผิด)');
        return null;
      }
    } catch (error) {
      console.error('API Error:', error);
      alert('เกิดข้อผิดพลาดในการเชื่อมต่อ: ' + error.message);
      return null;
    }
  }

  // โหลดข้อมูลเบื้องต้นเมื่อเปิดหน้าเว็บ
  window.onload = async function() {
    const data = await callAPI('getSystemData');
    if (data) systemData = data;
    setupLeaveRules(); 
  };

  // ฟังก์ชันสลับหน้าจอ
  function showView(viewId) {
    document.querySelectorAll('.container > div').forEach(el => el.classList.add('hidden'));
    document.getElementById(viewId).classList.remove('hidden');
    window.scrollTo(0,0);
  }

  // ฟังก์ชันเข้าสู่ระบบ
  async function doLogin() {
    const id = document.getElementById('login-id').value;
    if (!id) return alert('กรุณากรอก RamaID');
    
    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.innerText = 'กำลังตรวจสอบ...';
    
    const result = await callAPI('login', { ramaId: id });
    btn.disabled = false; btn.innerText = 'เข้าสู่ระบบ';

    if (result && result.success) {
      currentUser = result.data;
      document.getElementById('display-name').innerText = currentUser.name;
      document.getElementById('display-group').innerText = currentUser.group;
      document.getElementById('display-rama-id').innerText = 'RamaID: ' + currentUser.ramaId;
      showView('view-main');
    } else if (result) {
      alert(result.message);
    }
  }

  // ฟังก์ชันออกจากระบบ
  function logout() {
    currentUser = null; 
    document.getElementById('login-id').value = ''; 
    showView('view-login');
  }

  // ฟังก์ชันตั้งค่าเงื่อนไขวันที่และจำนวนวันลา
  function setupLeaveRules() {
    const type = document.getElementById('leave-type').value;
    const dateInput = document.getElementById('leave-date');
    const durationInput = document.getElementById('leave-duration');
    const btnNext = document.getElementById('btn-next');
    const hint = document.getElementById('date-hint');

    dateInput.value = '';
    durationInput.innerHTML = '';
    
    if (!type) {
      dateInput.disabled = true; durationInput.disabled = true; btnNext.disabled = true;
      return;
    }

    const today = new Date();
    today.setHours(0,0,0,0); 
    
    let minDate, maxDate;
    let durations = [];

    if (type === 'ป่วย') {
      minDate = today;
      maxDate = new Date(today); maxDate.setDate(today.getDate() + 1);
      hint.innerText = 'เลือกได้: วันนี้ - พรุ่งนี้';
      durations = [0.5, 1, 2, 3];
    } else if (type === 'กิจ') {
      minDate = new Date(today); minDate.setDate(today.getDate() + 1);
      maxDate = new Date(today); maxDate.setMonth(today.getMonth() + 6);
      hint.innerText = 'เลือกได้: พรุ่งนี้ - 6 เดือนข้างหน้า';
      durations = [0.5, 1, 2, 3, 4, 5];
    } else if (type === 'พักผ่อน' || type === 'ประชุม') {
      minDate = new Date(today); minDate.setDate(today.getDate() + 2);
      maxDate = new Date(today); maxDate.setMonth(today.getMonth() + 6);
      hint.innerText = 'เลือกได้: มะรืนนี้ - 6 เดือนข้างหน้า';
      durations = [1, 2, 3, 4, 5];
    } else if (type === 'เรียนเลือก') {
      minDate = new Date(today); minDate.setDate(today.getDate() + 1);
      maxDate = new Date(today); maxDate.setMonth(today.getMonth() + 6);
      hint.innerText = 'เลือกได้: พรุ่งนี้ - 6 เดือนข้างหน้า';
      for(let i=1; i<=30; i++) durations.push(i);
    } else if (type === 'ต่างประเทศ') {
      minDate = new Date(today); minDate.setDate(today.getDate() + 7);
      maxDate = new Date(today); maxDate.setMonth(today.getMonth() + 6);
      hint.innerText = 'เลือกได้: 7 วันข้างหน้า - 6 เดือนข้างหน้า';
      for(let i=1; i<=15; i++) durations.push(i);
    }

    dateInput.min = formatDateStr(minDate);
    dateInput.max = formatDateStr(maxDate);
    dateInput.disabled = false;
    
    durations.
