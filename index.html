<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ระบบลางานออนไลน์ สาขาวิชาผิวหนัง</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    body { background-color: #f8f9fa; }
    .app-header { background-color: #24292e; color: white; padding: 15px; text-align: center; border-radius: 0 0 15px 15px; margin-bottom: 20px;}
    .profile-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GithubAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 1. ใส่ Config ของ Firebase ของคุณ
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GithubAuthProvider();

    // 2. ใส่ URL ของ Google Apps Script ที่ Deploy เป็น Web App แล้ว
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzr6rIVsdrSAY7HMZpFix_06zouRhhbXhl7OmWRrfENtfbH2oiKYFe6wDk-mu0KKuDL/exec";

    let holidayList = [];

    // ดึงข้อมูลวันหยุดจาก GAS ทันทีที่โหลดหน้าเว็บ
    window.onload = async function() {
      try {
        const response = await fetch(GAS_URL + "?action=getHolidays");
        const data = await response.json();
        holidayList = data.holidays;
      } catch (error) {
        console.error("ดึงข้อมูลวันหยุดล้มเหลว:", error);
      }
    };

    // ฟังก์ชัน Login
    window.loginWithGitHub = function() {
      document.getElementById('loginBtn').innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังเข้าสู่ระบบ...';
      
      signInWithPopup(auth, provider).then((result) => {
        const user = result.user;
        
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('app-section').style.display = 'block';
        
        document.getElementById('userProfileImg').src = user.photoURL;
        document.getElementById('userName').innerText = user.displayName || user.email;
        
      }).catch((error) => {
        alert("Login Error: " + error.message);
        document.getElementById('loginBtn').innerHTML = 'ล็อกอินด้วย GitHub';
      });
    }

    // ฟังก์ชัน Logout
    window.logout = function() {
      signOut(auth).then(() => {
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('app-section').style.display = 'none';
      });
    }

    // นำ GAS_URL ไปใช้ในฟังก์ชัน Submit ด้านล่าง
    window.GAS_URL = GAS_URL; 
  </script>
</head>
<body>

  <div id="login-section" class="container mt-5 text-center">
    <h2 class="mb-4">ระบบลางานออนไลน์<br><small class="text-muted">สาขาวิชาผิวหนัง</small></h2>
    <div class="card shadow-sm mx-auto" style="max-width: 400px;">
      <div class="card-body py-5">
        <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" width="80" class="mb-3">
        <p class="mb-4">กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</p>
        <button id="loginBtn" onclick="loginWithGitHub()" class="btn btn-dark w-100 py-2 rounded-pill">
          ล็อกอินด้วย GitHub
        </button>
      </div>
    </div>
  </div>

  <div id="app-section" class="container-fluid" style="display: none; max-width: 600px; margin: auto;">
    
    <div class="app-header shadow-sm">
      <div class="d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
          <img id="userProfileImg" src="" class="profile-img me-2">
          <div class="text-start">
            <h6 class="mb-0" id="userName">ชื่อผู้ใช้งาน</h6>
            <small class="text-light">เจ้าหน้าที่สาขาผิวหนัง</small>
          </div>
        </div>
        <button onclick="logout()" class="btn btn-sm btn-outline-light">ออก</button>
      </div>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h5 class="card-title mb-3">📝 แบบฟอร์มขออนุมัติลา</h5>
        <form id="leaveForm" onsubmit="handleFormSubmit(event)">
          
          <div class="mb-3">
            <label class="form-label">ประเภทการลา</label>
            <select class="form-select" id="leaveType" required onchange="toggleShiftOption()">
              <option value="" disabled selected>-- เลือกประเภทการลา --</option>
              <option value="ตรวจ">ลาตรวจ (เช้า/บ่าย/เย็น)</option>
              <option value="ป่วย">ลาป่วย</option>
              <option value="กิจ">ลากิจ</option>
              <option value="พักผ่อน">ลาพักผ่อน</option>
            </select>
          </div>

          <div class="mb-3" id="shiftDiv" style="display: none;">
            <label class="form-label">ช่วงเวลาการลาตรวจ</label>
            <select class="form-select" id="leaveShift">
              <option value="เช้า">ลาตรวจเช้า</option>
              <option value="บ่าย">ลาตรวจบ่าย</option>
              <option value="เย็น">ลาตรวจเย็น</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">วันที่</label>
            <input type="date" class="form-control" id="leaveDate" required onchange="validateDate()">
            <div id="dateWarning" class="form-text text-danger" style="display:none;">
              ไม่อนุญาตให้ลาประเภทนี้ในวันหยุดเสาร์-อาทิตย์ หรือวันหยุดพิเศษครับ
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 mt-2">บันทึกการลา</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    function toggleShiftOption() {
      const type = document.getElementById('leaveType').value;
      const shiftDiv = document.getElementById('shiftDiv');
      shiftDiv.style.display = (type === 'ตรวจ') ? 'block' : 'none';
      validateDate();
    }

    function validateDate() {
      const dateInput = document.getElementById('leaveDate').value;
      const leaveType = document.getElementById('leaveType').value;
      const warning = document.getElementById('dateWarning');
      
      if (!dateInput || !leaveType) return;

      const selectedDate = new Date(dateInput);
      const dayOfWeek = selectedDate.getDay(); 

      if (leaveType !== 'ตรวจ') {
        const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
        // เช็คกับ Array วันหยุดที่ดึงมาจาก GAS
        const isHoliday = window.holidayList && window.holidayList.includes(dateInput); 

        if (isWeekend || isHoliday) {
          warning.style.display = 'block';
          document.getElementById('leaveDate').value = ''; 
        } else {
          warning.style.display = 'none';
        }
      } else {
        warning.style.display = 'none';
      }
    }

    async function handleFormSubmit(event) {
      event.preventDefault();
      
      const formData = {
        action: 'submitLeave', // บอก GAS ว่าให้ทำอะไร
        name: document.getElementById('userName').innerText,
        leaveType: document.getElementById('leaveType').value,
        shift: document.getElementById('leaveType').value === 'ตรวจ' ? document.getElementById('leaveShift').value : 'เต็มวัน',
        date: document.getElementById('leaveDate').value
      };

      const btn = event.target.querySelector('button[type="submit"]');
      const originalText = btn.innerText;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังบันทึก...';
      btn.disabled = true;

      try {
        // ยิงข้อมูลไปหา Google Apps Script ผ่าน Fetch API
        const response = await fetch(window.GAS_URL, {
          method: 'POST',
          body: JSON.stringify(formData)
        });
        
        const result = await response.json();
        
        if(result.success) {
          alert('บันทึกการลาและลงปฏิทินสำเร็จ!');
          document.getElementById('leaveForm').reset();
          toggleShiftOption();
        } else {
          alert('เกิดข้อผิดพลาด: ' + result.error);
        }
      } catch (error) {
        alert('เกิดข้อผิดพลาดในการเชื่อมต่อ: ' + error.message);
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
